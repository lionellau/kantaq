name: py

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: py-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Disposable Postgres so the SQLite/Postgres dialect-parity test (E02-T3,
    # NFR-E02-1) runs against a real server. EphemeralPostgres creates and drops
    # a throwaway database per test; locally (no service) those tests skip.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (mypy, strict)
        run: >
          uv run mypy
          -p kantaq -p kantaq_protocol -p kantaq_sync_engine
          -p kantaq_core -p kantaq_mcp -p kantaq_db -p kantaq_runtime
          -p kantaq_test_harness

      - name: Test + coverage gate (pytest; protocol/mcp/core >= 90%)
        env:
          KANTAQ_TEST_POSTGRES_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
        run: uv run pytest --cov --cov-fail-under=90
