name: web

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # D-08: the typed client is generated, never hand-edited. Regenerate from
      # the checked-in OpenAPI document and fail on any drift. (The document
      # itself is gated against the FastAPI app by test_openapi_drift in py CI.)
      - name: Typed client drift gate (D-08)
        run: |
          pnpm gen:api
          git diff --exit-code -- src/api/schema.d.ts

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (Vitest)
        run: pnpm test
