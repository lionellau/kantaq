name: web

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # D-08: the typed client is generated, never hand-edited. Regenerate from
      # the checked-in OpenAPI document and fail on any drift. (The document
      # itself is gated against the FastAPI app by test_openapi_drift in py CI.)
      - name: Typed client drift gate (D-08)
        run: |
          pnpm gen:api
          git diff --exit-code -- src/api/schema.d.ts

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (Vitest)
        run: pnpm test

  # The hero-flow end-to-end (E19/E20, harness standard §4 UI profile): a real
  # runtime (migrations → bootstrap → seeded proposal) serving the built UI,
  # driven by Playwright. Backs the sprint-2 dogfood-gate demo.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        working-directory: .
        run: uv sync --frozen

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the UI (the runtime serves web/dist)
        run: pnpm build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Hero-flow end-to-end (Playwright)
        run: pnpm test:e2e

      - name: UAT browser specs (walkthrough, roles, two-user collab)
        env:
          KANTAQ_UAT: "1"
        run: |
          pnpm exec playwright test e2e/uat-walkthrough.spec.ts
          pnpm exec playwright test e2e/uat-roles.spec.ts
          pnpm exec playwright test e2e/uat-collab.spec.ts
