[project]
name = "kantaq-sync-engine"
version = "0.2.0"
description = "kantaq sync engine: event log, snapshots, cursors, push/pull (MOD-04, MOD-26)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    # The event log + cursors live in the local replica schema (MOD-02), and
    # the fold/audit semantics are shared with the tracker domain (MOD-03).
    "kantaq-db",
    "kantaq-core",
    # The wire ``Event`` is the canonical protocol entity and signing rides the
    # protocol codec (E04-T4 / MOD-17): one nominal type, one codec.
    "kantaq-protocol",
    "sqlmodel>=0.0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kantaq_sync_engine"]
