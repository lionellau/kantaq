[project]
name = "kantaq-test-harness"
version = "0.0.5"
description = "kantaq shared test harness: builders, fakes, fixtures, runners (MOD-30)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pytest>=8.3.0",
    "hypothesis>=6.100.0",
    "sqlalchemy>=2.0.0",
]

# Auto-load the harness fixtures (fake_clock, seeded_random, fake_backend) as a
# pytest plugin so every package's tests/ can use them without a conftest.
[project.entry-points.pytest11]
kantaq_test_harness = "kantaq_test_harness.fixtures"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kantaq_test_harness"]
