[project]
name = "kantaq-test-harness"
version = "0.0.5"
description = "kantaq shared test harness: builders, fakes, fixtures, runners (MOD-30)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pytest>=8.3.0",
    "hypothesis>=6.100.0",
    "sqlalchemy>=2.0.0",
    # FakePostgREST (the Backend profile's Supabase data-API fake, E24-T4)
    # answers httpx requests with real SQL; imported per-test, never on the
    # pytest plugin path (the MOD-30 coverage rule).
    "httpx>=0.27.0",
    # FakeMCPClient (the Gateway/Agent profile's real-SDK agent, E09/E10)
    # drives the official MCP client over in-process ASGI; same per-test
    # import rule as FakePostgREST.
    "mcp>=1.16",
    "anyio>=4.5",
    "starlette>=0.40.0",
    # The two-replica simulator (MOD-04's harness profile) composes the real
    # tracker + event log on purpose; the leaf fakes stay ORM-free.
    "kantaq-db",
    "kantaq-core",
    "kantaq-sync-engine",
    "sqlmodel>=0.0.22",
]

# Auto-load the harness fixtures (fake_clock, seeded_random, fake_backend) as a
# pytest plugin so every package's tests/ can use them without a conftest.
[project.entry-points.pytest11]
kantaq_test_harness = "kantaq_test_harness.fixtures"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kantaq_test_harness"]
