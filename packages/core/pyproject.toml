[project]
name = "kantaq-core"
version = "0.2.0"
description = "kantaq core: tracker domain, identity, audit, resolver, recommendations (MOD-03, MOD-06, MOD-07, MOD-21, MOD-22)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    # Argon2id token hashing (MOD-06 / E06). >=45 for the PHC-encoded helpers;
    # the official wheels bundle OpenSSL >= 3.2, which Argon2 needs.
    "cryptography>=45.0",
    # Identity domain logic reads/writes the members/tokens collections (MOD-02).
    "sqlmodel>=0.0.22",
    "kantaq-db",
    # Device keys + capability grants sign/verify via the protocol core (E06 v0.1).
    "kantaq-protocol",
]

[project.optional-dependencies]
# S3-compatible object storage for attachments (E25-T3 / D-32). Optional: the
# filesystem BlobStore is the default and needs nothing; install with the `s3`
# extra only to point attachments at a shared S3/MinIO/R2 bucket. boto3 is
# Apache-2.0, AWS-maintained, and imported on demand by S3BlobStore.from_config.
s3 = ["boto3>=1.34"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kantaq_core"]
