[project]
name = "kantaq-protocol"
version = "0.0.5"
description = "kantaq protocol core: entities, canonical codec, Ed25519, grant verify (MOD-17)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kantaq_protocol"]
