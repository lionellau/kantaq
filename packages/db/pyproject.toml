[project]
name = "kantaq-db"
version = "0.0.5"
description = "kantaq db: SQLModel models + Alembic migrations (MOD-02)"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "sqlmodel>=0.0.22",
    "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kantaq_db"]
